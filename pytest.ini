[pytest]
# ── 基本設定 ─────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── 輸出格式 ─────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── 自訂 Markers ─────────────────────────────────
markers =
    smoke:     快速冒煙測試，PR merge 前必跑
    regression: 完整回歸測試
    negative:  負向測試 (error cases)
    performance: 效能相關測試
    auth:      認證授權相關
    crud:      CRUD 操作

